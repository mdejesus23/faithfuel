media:
  - name: product_images
    label: Product Images
    input: src/data/products
    output: src/data/products

content:
  - name: products
    label: Products
    type: collection
    path: src/data/products
    filename: index.json
    fields:
      - name: name
        label: Name
        type: string
        required: true
      - name: description
        label: Description
        type: text
        required: true
      - name: price
        label: Price
        type: number
        required: true
      - name: images
        label: Image Filepaths
        type: string
        default: ./images/{replace-with-the-real-image-filename.ext}
        list: true
        required: true
      - name: sizes
        label: Sizes
        type: select
        list: true
        required: true
        options:
          values:
            - XS
            - S
            - M
            - L
            - XL
            - XXL
      - name: category
        label: Category
        type: string
        required: true
      - name: seller
        label: Seller
        type: string
        required: true
      - name: featured
        label: Featured
        type: boolean
        default: false
      - name: inStock
        label: In Stock
        type: boolean
        default: true
      - name: tags
        label: Tags
        type: string
        list: true
      - name: date
        label: Date
        type: string
        required: true

  - name: customers
    label: Customers
    type: collection
    path: src/data/customers
    filename: index.json
    fields:
      - name: name
        label: Name
        type: string
        required: true
      - reviews: reviews
        label: Reviews
        type: string
        required: false
      - rate: rate
        label: Rate
        type: number
        required: false
      - image: image
        label: Image Filepaths
        type: string
        default: ./{replace-with-the-real-image-filename.ext}
        required: false

  # Privacy Policy Collection
  - name: policies
    label: Privacy Policies
    type: collection
    path: src/data/privacy
    format: yaml-frontmatter
    filename: index.md
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: description
        label: Description
        type: text
        required: true
      - name: lastUpdated
        label: Last Updated
        type: string
        required: true
      - name: body
        label: Body
        type: rich-text

  # Shipping and Return Collection
  - name: shipping
    label: Shipping and Returns
    type: collection
    path: src/data/shipping
    format: yaml-frontmatter
    filename: index.md
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: description
        label: Description
        type: text
        required: true
      - name: lastUpdated
        label: Last Updated
        type: string
        required: true
      - name: body
        label: Body
        type: rich-text

  # Sizing Guide Collection
  - name: sizingGuide
    label: Sizing Guide
    type: collection
    path: src/data/sizing-guide
    format: yaml-frontmatter
    filename: index.md
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: description
        label: Description
        type: text
        required: true
      - name: lastUpdated
        label: Last Updated
        type: string
        required: true
      - name: body
        label: Body
        type: rich-text
